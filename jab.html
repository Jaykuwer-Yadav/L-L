<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --sys-bg: #05070a;
            --mana-cyan: #00d4ff;
            --hunter-shadow: #1a1f29;
        }

        body {
            background-color: var(--sys-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* THE SYSTEM FRAME */
        .system-display {
            width: 300px;
            height: 400px;
            border: 1px solid #30363d;
            position: relative;
            background: rgba(13, 17, 23, 0.9);
        }

        /* HUNTER BODY PARTS */
        .hunter { position: absolute; top: 100px; left: 125px; transition: 0.3s; }
        .head { width: 40px; height: 40px; border: 2px solid var(--mana-cyan); border-radius: 50%; margin-bottom: 5px; }
        .torso { width: 50px; height: 80px; border: 2px solid var(--mana-cyan); background: var(--hunter-shadow); border-radius: 5px; }
        
        .arm, .leg { position: absolute; background: var(--hunter-shadow); border: 2px solid var(--mana-cyan); transition: 0.3s; }
        
        /* Arms */
        .arm { width: 10px; height: 70px; top: 10px; transform-origin: top center; }
        .left-arm { left: -12px; transform: rotate(10deg); }
        .right-arm { right: -12px; transform: rotate(-10deg); }

        /* Legs */
        .leg { width: 12px; height: 80px; bottom: -80px; transform-origin: top center; }
        .left-leg { left: 5px; }
        .right-leg { right: 5px; }

        /* JUMPING JACK ANIMATION (Based on image_bc727e.png) */
        @keyframes jack {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        .active-system { animation: jack 0.8s infinite ease-in-out; }

        /* State 2: The Spread */
        .active-system .left-arm { transform: rotate(150deg); }
        .active-system .right-arm { transform: rotate(-150deg); }
        .active-system .left-leg { transform: rotate(25deg); }
        .active-system .right-leg { transform: rotate(-25deg); }
    </style>
</head>
<body>
    <div class="system-display" onclick="this.classList.toggle('active-system')">
        <div class="hunter">
            <div class="head"></div>
            <div class="torso">
                <div class="arm left-arm"></div>
                <div class="arm right-arm"></div>
                <div class="leg left-leg"></div>
                <div class="leg right-leg"></div>
            </div>
        </div>
    </div>
</body>
</html>
