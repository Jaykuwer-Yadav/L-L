<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System - Quest Info</title>
    <style>
      body {
        background-color: #0a0a0b;
        color: #000000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      /* The System Window Style */
      .black { 
        background: rgba(16, 22, 34, 0.95);
        border: 2px solid #00d4ff;
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        padding: 30px; 
        border-radius: 2px; /* Sharp edges for that UI feel */
        width: 350px;
        position: relative;
      }

      h2 { color: #00d4ff; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #00d4ff; padding-bottom: 10px;}

      label { display: block; margin-top: 15px; font-size: 0.8rem; color: #00d4ff; text-transform: uppercase; }

      input, select {
        background: transparent;
        border: 1px solid #444;
        color: #00d4ff ;
        padding: 10px;
        width: 100%;
        margin-top: 5px;
        box-sizing: border-box;
      }

      button {
        background: #00d4ff;
        color: #000;
        border: none;
        padding: 12px;
        width: 100%;
        margin-top: 20px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        transition: 0.3s;
      }

      button:hover { background: #fff; box-shadow: 0 0 15px #00d4ff; }

      /* Hidden Quest Results */
      #quest-window {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ff4444;
        background: rgba(255, 68, 68, 0.1);
        display: none;
      }

      .warning { color: #ff4444; font-weight: bold; }
    </style>
  </head>
  <body>

    <div class="black">
      <h2>[ DAILY QUEST ]</h2>
      
      <label>Hunter Name</label>
      <input type="text" id="UserName" placeholder="Sung Jin-Woo" />
      
      <label>Awakened Age</label>
      <input type="number" id="Age" placeholder="24" />
      
      <label>Current Rank (Fitness Level)</label>
      <select id="level">
        <option value="E-Rank">E-Rank (Beginner)</option>
        <option value="C-Rank">C-Rank (Intermediate)</option>
        <option value="S-Rank">S-Rank (Advanced)</option>
      </select>

      <button onclick="startQuest()">Check Quest Requirements</button>

      <div id="quest-window">
        <p class="warning">! WARNING !</p>
        <p id="quest-desc"></p>
        <p style="font-size: 0.7rem; color: #201d1d;">*Failure to complete may result in a penalty.*</p>
      </div>
    </div>

    <script>
      function startQuest() {
        const name = document.getElementById('UserName').value || "Unknown Hunter";
        const rank = document.getElementById('level').value;
        const questWindow = document.getElementById('quest-window');
        const questDesc = document.getElementById('quest-desc');

        const quests = {
          "E-Rank": "100 Push-ups, 100 Sit-ups, 100 Squats, and 10km Running. Prepare to level up.",
          "C-Rank": "200 Push-ups, 200 Sit-ups, 20km Running, and Shadow Training (Shadow Boxing).",
          "S-Rank": "Daily Dungeon Clear: 500 Reps of each exercise and a 40km Marathon. Transcend your limits."
        };

        questDesc.innerHTML = `<strong>Hunter ${name}</strong>, your ${rank} Quest has arrived:<br><br>${quests[rank]}`;
        questWindow.style.display = "block";
      }
    </script>
  </body>
</html>
