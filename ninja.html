<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System - Combat Maneuvers</title>
    <style>
      :root { --combat-red: #ff3e3e; --ninja-purple: #a371f7; --sys-bg: #050505; }
      body { background-color: var(--sys-bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }

      .combat-window { 
        width: 420px; background: rgba(10, 10, 15, 0.95); border: 2px solid var(--combat-red); 
        box-shadow: 0 0 30px rgba(255, 62, 62, 0.2); padding: 25px; border-radius: 5px;
      }

      h2 { color: var(--combat-red); text-transform: uppercase; letter-spacing: 5px; text-align: center; margin-bottom: 20px; text-shadow: 0 0 10px var(--combat-red); }

      .input-group { margin-bottom: 15px; }
      label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
      
      input, select { 
        width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; box-sizing: border-box; 
        font-family: 'Courier New', monospace;
      }

      .btn-combat { 
        width: 100%; background: var(--combat-red); color: white; border: none; padding: 15px; 
        font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px;
        transition: 0.3s;
      }
      .btn-combat:hover { background: #fff; color: #000; box-shadow: 0 0 20px #fff; }

      /* Darebee Style Combat Card */
      #combat-plan {
        margin-top: 30px; display: none; animation: flash 0.5s ease-in-out;
      }

      @keyframes flash { 
        0% { background: var(--combat-red); } 
        100% { background: transparent; }
      }

      .plan-header { 
        background: var(--combat-red); color: #000; padding: 5px 10px; font-weight: 900; 
        text-transform: uppercase; font-size: 0.9rem; display: flex; justify-content: space-between;
      }

      .move-list { list-style: none; padding: 0; margin-top: 15px; }
      .move-item { 
        padding: 12px; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between;
      }
      .move-item:last-child { border-bottom: none; }
      .move-name { font-weight: bold; color: var(--ninja-purple); }
      .reps { color: #fff; font-family: 'Courier New', monospace; }

      .set-counter { text-align: center; margin-top: 15px; font-size: 0.75rem; color: #666; border-top: 1px solid #222; padding-top: 10px; }
    </style>
  </head>
  <body>

    <div class="combat-window">
      <h2>[ COMBAT MODE ]</h2>
      
      <div class="input-group">
        <label>Primary Build / Class</label>
        <select id="class-type">
          <option value="ninja">Ninja (Agility/Stealth)</option>
          <option value="brawler">Brawler (Strength/Striking)</option>
          <option value="assassin">Shadow Assassin (Speed/Lethality)</option>
        </select>
      </div>

      <div class="input-group">
        <label>Current Agility Level (1-100)</label>
        <input type="number" id="agility" placeholder="Enter your speed score">
      </div>

      <button class="btn-combat" onclick="unlockCombat()">Unlock Combat Plan</button>

      <div id="combat-plan">
        <div class="plan-header">
          <span id="rank-title">E-RANK NINJA</span>
          <span>LEVEL: <span id="diff-level">I</span></span>
        </div>
        
        <ul class="move-list" id="move-container">
          <!-- Moves injected here -->
        </ul>

        <div class="set-counter">
          RECOVERY TIME: 60 SECONDS | <span id="sets-count">3 SETS</span>
        </div>
      </div>
    </div>
    
    <script>
      function unlockCombat() {
        const agility = parseInt(document.getElementById('agility').value) || 0;
        const classType = document.getElementById('class-type').value;
        const plan = document.getElementById('combat-plan');
        const moveContainer = document.getElementById('move-container');
        const rankTitle = document.getElementById('rank-title');
        const diffLevel = document.getElementById('diff-level');
        const setsCount = document.getElementById('sets-count');

        let rank = "E-RANK";
        let level = "I";
        let sets = "3 Sets";
        let moves = [];

        // Logic based on Agility Score
        if (agility >= 80) {
          rank = `S-RANK ${classType.toUpperCase()}`;
          level = "V";
          sets = "7 Sets";
          moves = [
            ["Double Side Kicks", "40 Reps"],
            ["Burpee Tucks", "20 Reps"],
            ["Slow-Mo Hooks", "40 Reps"],
            ["Climb-ups", "20 Reps"]
          ];
        } else if (agility >= 40) {
          rank = `B-RANK ${classType.toUpperCase()}`;
          level = "III";
          sets = "5 Sets";
          moves = [
            ["Jabs + Cross", "40 Reps"],
            ["Side Kicks", "20 Reps"],
            ["Squat Hooks", "20 Reps"],
            ["Push-ups", "15 Reps"]
          ];
        } else {
          rank = `E-RANK ${classType.toUpperCase()}`;
          level = "I";
          sets = "3 Sets";
          moves = [
            ["Shadow Boxing", "2 Minutes"],
            ["Basic Punches", "40 Reps"],
            ["Knee Strikes", "20 Reps"],
            ["Plank Hold", "30 Secs"]
          ];
        }

        // Apply to UI
        rankTitle.innerText = rank;
        diffLevel.innerText = level;
        setsCount.innerText = sets;
        
        moveContainer.innerHTML = moves.map(m => `
          <li class="move-item">
            <span class="move-name">${m[0]}</span>
            <span class="reps">${m[1]}</span>
          </li>
        `).join('');

        plan.style.display = "block";
      }
    </script>
  </body>
</html>
